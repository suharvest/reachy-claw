# Reachy Claw — Jetson deployment config.
#
# LLM backend:
#   Ollama mode:   llm.backend: ollama  (default below)
#   OpenClaw mode: llm.backend: gateway (+ start with --profile openclaw)

llm:
  backend: ollama
  model: qwen3.5:2b-q4_K_M
  base_url: http://localhost:11434
  # max_history: 5

  # To switch to OpenClaw, change to:
  # backend: gateway

# gateway:                       # only needed for OpenClaw mode
#   host: 127.0.0.1
#   port: 18790

stt:
  backend: paraformer-streaming
  speech_service_url: http://localhost:8621

tts:
  backend: matcha
  speech_service_url: http://localhost:8621
  matcha:
    speaker_id: 0
    speed: 0.8

vad:
  backend: silero

barge_in:
  enabled: true
  confirm_frames: 2
  energy_threshold: 0.02
  silero_threshold: 0.5
  cooldown_ms: 300

audio:
  device: "Reachy Mini Audio"
  volume: 5.0

reachy:
  serialport: auto
  spawn_daemon: false  # daemon runs as separate container
  connection_mode: localhost_only
  daemon_port: 38001
  media_backend: gstreamer

vision:
  tracker: remote
  service_url: tcp://127.0.0.1:8631
  emotion_threshold: 0.6
  emotion_cooldown: 5.0

conversation:
  mode: monologue
  monologue_interval: 5.0

dashboard:
  enabled: true
  port: 8640

plugins:
  face_tracker: true
