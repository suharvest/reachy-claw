# Unified Reachy Claw stack for Jetson.
#
# LLM modes (pick one):
#   Ollama mode (default):  docker compose --profile ollama up -d
#   OpenClaw mode:          docker compose --profile openclaw up -d
#   + vision:               add --profile vision
#
# Both modes share: reachy-daemon, reachy-claw, speech (external).
# Ollama profile adds: ollama container.
# OpenClaw profile adds: openclaw-gateway.
#
# Data directory:
#   All persistent data (captures, face DB, etc.) is stored under DATA_DIR.
#   Default: ~/reachy-data   Override: DATA_DIR=/path/to/dir docker compose up -d

services:
  # ── Always-on services ────────────────────────────────────────────

  reachy-daemon:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-daemon:v1.0
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    # --no-media disables camera/audio/WebRTC in the daemon — we handle all media
    # via vision-trt (local or remote) and the speech service, so the daemon has
    # no business touching /dev/video0.
    command: >-
      reachy-mini-daemon
      --serialport ${SERIAL_PORT:-auto}
      --localhost-only
      --no-media
      --fastapi-port 38001
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  reachy-claw:
    image: sensecraft-missionpack.seeed.cn/solution/reachy-claw:v1.18
    container_name: reachy-claw
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - ./reachy-claw.jetson.yaml:/app/reachy-claw.yaml:ro
      - ${DATA_DIR:-~/reachy-data}/reachy-claw:/app/data
      - /dev/shm:/dev/shm
      - /run/udev:/run/udev:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATA_DIR=/app/data
      - HOST_DATA_DIR=${DATA_DIR:-~/reachy-data}
    depends_on:
      reachy-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8641/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Vision TRT (opt-in) ──────────────────────────────────────────

  vision-trt:
    profiles: ["vision"]
    image: sensecraft-missionpack.seeed.cn/solution/vision-trt:v2.1
    container_name: vision-trt
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    devices:
      - ${CAMERA_DEVICE:-/dev/video0}:${CAMERA_DEVICE:-/dev/video0}
    volumes:
      # Persistent TRT engine cache (avoid rebuild on restart)
      - vision-trt-engines:/app/engines
      # Persistent data (captures, face DB) — bind mount to host for easy access
      - ${DATA_DIR:-~/reachy-data}/vision:/app/data
      # Host TensorRT (JetPack 6.x)
      - /usr/lib/python3.10/dist-packages/tensorrt:/usr/lib/python3.10/dist-packages/tensorrt:ro
      - /lib/aarch64-linux-gnu:/host-libs:ro
      # Host NVIDIA GStreamer plugins + libs (l4t-base has stubs)
      - /usr/lib/aarch64-linux-gnu/gstreamer-1.0:/host-gst-plugins:ro
      - /usr/lib/aarch64-linux-gnu/nvidia:/host-nvidia-libs:ro
      - /usr/local/cuda-12.6/targets/aarch64-linux/lib:/host-cuda-tgt:ro
      - /run/udev:/run/udev:ro
    privileged: true
    environment:
      - LD_LIBRARY_PATH=/host-nvidia-libs:/host-libs:/host-cuda-tgt:/usr/local/cuda/lib64
      - GST_PLUGIN_PATH=/host-gst-plugins
      - GST_V4L2_USE_LIBV4L2=1
      - CAMERA_DEVICE=${CAMERA_DEVICE:-/dev/video0}
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - STREAM_PORT=8632
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8630/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s  # TRT engine build can take 5+ min on first boot
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Ollama (runs as standalone container, not compose-managed) ───
  # docker run -d --name ollama --restart unless-stopped --runtime nvidia \
  #   --network host -v ~/.ollama:/root/.ollama ollama/ollama

  # ── OpenClaw profile (opt-in) ────────────────────────────────────

  openclaw-gateway:
    profiles: ["openclaw"]
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - openclaw-config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway", "--bind", "lan", "--allow-unconfigured"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw-config:
  vision-trt-engines:
