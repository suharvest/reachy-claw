# Local build compose — for building images on the Jetson itself.
# For production deploy with pre-built images, use: reachy/docker-compose.yml
#
# Usage:
#   docker compose up -d                           # Ollama mode
#   docker compose --profile openclaw up -d        # OpenClaw mode

services:
  reachy-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    command: ["reachy-mini-daemon", "--serialport", "${SERIAL_PORT:-auto}", "--localhost-only", "--deactivate-audio", "--fastapi-port", "38001"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  reachy-claw:
    build:
      context: ../..
      dockerfile: deploy/jetson/Dockerfile.reachy-claw
    container_name: reachy-claw
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./reachy-claw.jetson.yaml:/app/reachy-claw.yaml:ro
    depends_on:
      reachy-daemon:
        condition: service_healthy

  openclaw-gateway:
    profiles: ["openclaw"]
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - openclaw-config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway", "--bind", "lan", "--allow-unconfigured"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  openclaw-config:
