# Local build compose — for building images on the Jetson itself.
# For production deploy with pre-built images, use: reachy/docker-compose.yml
#
# Usage:
#   docker compose up -d                           # Ollama mode
#   docker compose --profile openclaw up -d        # OpenClaw mode
#
# Data directory:
#   All persistent data (captures, face DB, etc.) stored under DATA_DIR.
#   Default: ~/reachy-data   Override: DATA_DIR=/path/to/dir docker compose up -d

services:
  reachy-daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    container_name: reachy-daemon
    restart: unless-stopped
    network_mode: host
    privileged: true
    # --no-media disables camera/audio/WebRTC in the daemon — we handle all media
    # via vision-trt (local or remote) and the speech service, so the daemon has
    # no business touching /dev/video0.
    command: ["reachy-mini-daemon", "--serialport", "${SERIAL_PORT:-auto}", "--localhost-only", "--no-media", "--fastapi-port", "38001"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:38001/', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  reachy-claw:
    build:
      context: ../..
      dockerfile: deploy/jetson/Dockerfile.reachy-claw
    container_name: reachy-claw
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./reachy-claw.jetson.yaml:/app/reachy-claw.yaml:ro
    environment:
      # Point at local vision-trt by default; override for remote deployment:
      #   VISION_SERVICE_URL=tcp://<remote-ip>:8631 docker compose up -d
      - VISION_SERVICE_URL=${VISION_SERVICE_URL:-tcp://127.0.0.1:8631}
    depends_on:
      reachy-daemon:
        condition: service_healthy

  vision-trt:
    profiles: ["vision"]
    build:
      context: ./vision-trt
    container_name: vision-trt
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - vision-trt-engines:/app/engines
      # Persistent data (captures, face DB) — bind mount to host for easy access
      - ${DATA_DIR:-~/reachy-data}/vision:/app/data
    environment:
      - CAMERA_DEVICE=/dev/video0
      - ZMQ_PUB_PORT=8631
      - HTTP_PORT=8630
      - STREAM_PORT=8632

  openclaw-gateway:
    profiles: ["openclaw"]
    image: ghcr.io/phioranex/openclaw-docker:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - openclaw-config:/home/node/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_SKIP_SERVICE_CHECK=true
    command: ["gateway", "--bind", "lan", "--allow-unconfigured"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=15
      - AUTOHEAL_START_PERIOD=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  openclaw-config:
  vision-trt-engines:
