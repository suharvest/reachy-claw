llm:
  backend: ollama
  model: qwen3.5:2b-q4_K_M
  base_url: http://localhost:11434
  # max_history: 5

stt:
  backend: paraformer-streaming
  speech_service_url: http://localhost:8621

tts:
  backend: matcha
  speech_service_url: http://localhost:8621
  matcha:
    speaker_id: 3       # af_heart
    speed: 0.8
    pitch_shift: 1.5    # +1.5 semitones

vad:
  backend: silero

barge_in:
  enabled: true
  # Tuned for Reachy Mini speaker + close-range mic
  confirm_frames: 2
  energy_threshold: 0.03
  silero_threshold: 0.5
  cooldown_ms: 300

audio:
  device: "Reachy Mini Audio"
  volume: 5.0

reachy:
  serialport: auto
  spawn_daemon: false  # daemon runs as separate container
  connection_mode: localhost_only
  daemon_port: 38001
  media_backend: gstreamer

vision:
  camera_source: sdk
  tracker: remote

dashboard:
  enabled: true
  port: 8640

plugins:
  face_tracker: true
