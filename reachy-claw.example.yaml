# Reachy Claw Configuration
# Copy to one of these locations:
#   ./reachy-claw.yaml                           (project directory)
#   ~/.reachy-claw/config.yaml       (user home)
# Or specify explicitly: reachy-claw --config /path/to/config.yaml
# Environment variable: REACHY_CLAW_CONFIG=/path/to/config.yaml
#
# Priority: CLI args > environment variables > this file > defaults

# ── AI Backend ─────────────────────────────────────────────────────
# Choose one: "ollama" (local LLM, zero setup) or "gateway" (OpenClaw)
llm:
  backend: gateway               # "gateway" (default) or "ollama"

  # Ollama settings (only used when backend: ollama)
  # model: qwen3.5:2b            # any Ollama model
  # base_url: http://localhost:11434
  # max_history: 0               # conversation turns to keep (0 = stateless)
  # system_prompt: ""            # custom system prompt (empty = default)
  # temperature: 0.7

# OpenClaw gateway settings (only used when backend: gateway)
gateway:
  host: 127.0.0.1
  port: 18790
  path: /desktop-robot
  # token: your-openclaw-token

# SenseCraft integration (for deployment tools)
sensecraft:
  address: ""                  # SenseCraft IP:Port, e.g. "192.168.1.100:3260"
  # HTTP protocol added automatically when LLM calls SenseCraft API
  # When set, LLM can check SenseCraft availability and deploy IoT solutions

reachy:
  connection_mode: auto        # auto, localhost_only, network
  media_backend: default       # default, gstreamer

stt:
  backend: whisper             # whisper, faster-whisper, openai, sensevoice
  whisper_model: base          # tiny, base, small, medium, large
  # openai_api_key: sk-xxx
  # speech_service_url: http://192.168.1.50:8000  # for sensevoice
  # sensevoice_language: auto

tts:
  backend: elevenlabs          # elevenlabs, kokoro, macos-say, piper, none
  # voice: voice-id
  # model: /path/to/piper-model
  # speech_service_url: http://192.168.1.50:8000  # for kokoro
  # kokoro_speaker_id: 50      # 45-52 for Chinese voices
  # kokoro_speed: 1.0

audio:
  # device: "MacBook Pro Microphone"
  sample_rate: 16000
  silence_threshold: 0.01
  silence_duration: 1.5
  max_recording_duration: 30.0

barge_in:
  enabled: true
  energy_threshold: 0.02         # min audio energy to consider (filters background noise)
  confirm_frames: 3              # consecutive frames before interrupt (~200ms)
  silero_threshold: 0.6          # stricter VAD threshold during playback
  cooldown_ms: 500               # ignore barge-in for N ms after TTS starts

behavior:
  # wake_word: hey reachy
  play_emotions: true
  idle_animations: true
  standalone_mode: false

motion:
  emotion_intensity: 0.7
  head_tracking_smoothing: 0.3
  head_tracking_poll_interval: 0.1
  idle_animation_interval: 5.0

vision:
  tracker: mediapipe            # mediapipe, none
  camera_index: 0
  max_yaw: 25.0
  max_pitch: 15.0
  smoothing_alpha: 0.3
  deadzone: 0.02
  face_lost_delay: 2.0

plugins:
  face_tracker: true
  motion: true
