<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOTION MIRROR</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="hud">
    <img id="video-stream" alt="">
    <canvas id="overlay-canvas"></canvas>

    <div class="status-bar">
        <span class="status-title">EMOTION MIRROR</span>
        <div class="status-dots">
            <div class="badge"><span class="dot" id="dot-jetson"></span>Jetson</div>
            <div class="badge"><span class="dot" id="dot-robot"></span>Robot</div>
            <div class="badge"><span class="dot" id="dot-vision"></span>Vision</div>
            <div class="badge"><span class="dot live" id="dot-live"></span>LIVE</div>
        </div>
        <div class="status-state">
            <span class="state-indicator" id="robot-state" data-state="idle">idle</span>
        </div>
    </div>

    <button class="settings-btn" id="settings-open">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
    </button>

    <div class="monologue-area">
        <div class="observation-line" id="observation-text" style="display:none"></div>
        <div class="monologue-bubble" id="monologue-bubble">
            <div class="monologue-text" id="monologue-text">...</div>
        </div>
        <img class="monologue-avatar" src="/static/reachy-avatar.png" alt="Reachy">
    </div>

    <div class="asr-bar">
        <svg class="asr-mic" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <span class="asr-label">ASR</span>
        <span class="asr-text" id="asr-text"><i>&#20542;&#21548;&#20013;...</i></span>
    </div>
</div>

<div class="no-video" id="no-video">
    <div class="icon">&#x1f4f7;</div>
    <div>Connecting to vision service...</div>
</div>

<!-- Settings Overlay -->
<div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="settings-close" id="settings-close">&times;</button>
        </div>
        <div class="settings-tabs">
            <button class="settings-tab active" data-tab="mode">Mode</button>
            <button class="settings-tab" data-tab="faces">Face Management</button>
            <button class="settings-tab" data-tab="prompt">Prompt</button>
        </div>
        <div class="settings-content">
            <!-- Tab: Mode -->
            <div class="tab-pane active" id="tab-mode">
                <div class="mode-group">
                    <label class="mode-option selected" data-mode="conversation">
                        <input type="radio" name="mode" value="conversation" checked>
                        <div class="mode-radio"></div>
                        <div class="mode-info">
                            <h3>Conversation</h3>
                            <p>Normal dialogue mode. Robot responds to user speech with emotion tags driving expressions.</p>
                        </div>
                    </label>
                    <label class="mode-option" data-mode="monologue">
                        <input type="radio" name="mode" value="monologue">
                        <div class="mode-radio"></div>
                        <div class="mode-info">
                            <h3>Monologue</h3>
                            <p>Inner monologue mode. Robot observes and narrates thoughts. Expressions mirror detected user emotions via vision.</p>
                        </div>
                    </label>
                </div>
                <div class="mode-status" id="mode-status">Current: conversation</div>
            </div>

            <!-- Tab: Face Management -->
            <div class="tab-pane" id="tab-faces">
                <div class="face-section">
                    <h3>Registered Faces</h3>
                    <div class="face-list" id="face-list">
                        <div class="face-empty">Loading...</div>
                    </div>
                </div>

                <div class="face-section">
                    <h3>Live Camera Enroll</h3>
                    <div class="enroll-row">
                        <input class="enroll-input" id="enroll-name" placeholder="Name" maxlength="32">
                        <button class="enroll-btn" id="enroll-live-btn">Enroll</button>
                    </div>
                </div>

                <div class="face-section">
                    <h3>Upload Image</h3>
                    <div class="enroll-row">
                        <input class="enroll-input" id="upload-name" placeholder="Name" maxlength="32">
                    </div>
                    <div class="upload-area" id="upload-area">
                        <p>Drop images here or click to select</p>
                        <div class="upload-hint">JPG / PNG</div>
                        <input type="file" id="upload-input" multiple accept="image/*" style="display:none">
                    </div>
                    <div class="upload-preview" id="upload-preview"></div>
                    <button class="enroll-btn" id="upload-btn" disabled>Upload &amp; Enroll</button>
                </div>

                <div class="face-section">
                    <h3>Backup</h3>
                    <div class="export-import-row">
                        <button class="action-btn" id="export-btn">Export ZIP</button>
                        <button class="action-btn" id="import-btn">Import ZIP</button>
                        <input type="file" id="import-input" accept=".zip" style="display:none">
                    </div>
                </div>
            </div>

            <!-- Tab: Prompt -->
            <div class="tab-pane" id="tab-prompt">
                <div class="face-section">
                    <h3>Conversation Prompt</h3>
                    <textarea id="prompt-conversation" rows="8" class="prompt-textarea"></textarea>
                    <div class="prompt-actions">
                        <button class="action-btn" id="prompt-conv-reset">Reset Default</button>
                        <button class="enroll-btn" id="prompt-conv-save">Save</button>
                    </div>
                </div>
                <div class="face-section">
                    <h3>Monologue Prompt</h3>
                    <textarea id="prompt-monologue" rows="8" class="prompt-textarea"></textarea>
                    <div class="prompt-actions">
                        <button class="action-btn" id="prompt-mono-reset">Reset Default</button>
                        <button class="enroll-btn" id="prompt-mono-save">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
